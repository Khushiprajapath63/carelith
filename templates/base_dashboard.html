<!DOCTYPE html>
<html>
<head>

<title>Carelith</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

{% block extra_css %}{% endblock %}

<style>

body {
    background: #0a1628;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #0d1f3c;
    position: fixed;
    left: 0;
    top: 0;
    padding-top: 25px;
    color: white;
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.08);
}

.sidebar h4 {
    text-align: center;
    margin-bottom: 35px;
    font-weight: 700;
    color: white;
}

.sidebar a {
    display: block;
    padding: 12px 20px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-weight: 500;
    transition: 0.2s;
    border-left: 3px solid transparent;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.07);
    color: white;
    border-left: 3px solid #00d4ff;
}

.sidebar .logout {
    margin-top: auto;
    padding: 20px;
}

/* MAIN CONTENT */
.main {
    margin-left: 230px;
    padding: 30px;
    min-height: 100vh;
}

.logout button {
    width: 100%;
    border: none;
    border-radius: 8px;
    padding: 8px;
    font-weight: 600;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.15);
}

.logout button:hover {
    background: rgba(255,95,109,0.2);
    color: #ff8f9a;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4>🏥 Carelith</h4>

    {% if doctor %}
        <a href="{% url 'doctor_app:doctor_dashboard' %}">Dashboard</a>
        <a href="#">Patients</a>
        <a href="#">Reports</a>
        <a href="{% url 'doctor_app:doctor_settings' %}">Settings</a>
    {% elif patient %}
        <a href="{% url 'patients:patient_dashboard' %}">Dashboard</a>
        <a href="#">Appointments</a>
        <a href="#">Reports</a>
        <a href="{% url 'patients:patient_settings' %}">Settings</a>
    {% endif %}

    <div class="logout">
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    </div>

</div>

<!-- MAIN CONTENT -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
