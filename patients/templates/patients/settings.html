{% extends "base_dashboard.html" %}

{% block content %}

<style>

body{
background:#f4f7ff;
font-family: 'Segoe UI', sans-serif;
}

/* card */

.settings-card{
background:white;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
padding:35px;
max-width:600px;
margin:auto;
}

/* header */

.settings-header{
background:linear-gradient(135deg,#0d6efd,#3a7bfd);
color:white;
padding:18px 25px;
border-radius:14px 14px 0 0;
font-weight:600;
font-size:20px;
}

/* form */

.form-label{
font-weight:600;
color:#495057;
margin-bottom:4px;
}

.form-control,
.form-select{
border-radius:10px;
padding:10px;
}

/* button */

.update-btn{
background:linear-gradient(135deg,#0d6efd,#3a7bfd);
border:none;
border-radius:10px;
padding:10px 18px;
font-weight:600;
color:white;
transition:0.2s;
}

.update-btn:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(13,110,253,0.3);
}

/* info */

.info-text{
font-size:13px;
color:#6c757d;
}

</style>


<div class="container mt-5">

<div class="settings-card">

<div class="settings-header">
⚙ Patient Settings
</div>

<div class="p-4">

<form method="post">
{% csrf_token %}

<div class="mb-3">

<label class="form-label">Username</label>

<input type="text"
class="form-control"
value="{{ patient.user.username }}"
disabled>

<div class="info-text">Username cannot be changed</div>

</div>


<div class="mb-3">

<label class="form-label">Age</label>

<input type="number"
name="age"
class="form-control"
value="{{ patient.age }}">

</div>


<div class="mb-4">

<label class="form-label">Gender</label>

<select name="gender" class="form-select">

<option value="male"
{% if patient.gender == "male" %}selected{% endif %}>
Male
</option>

<option value="female"
{% if patient.gender == "female" %}selected{% endif %}>
Female
</option>

</select>

</div>


<button class="update-btn">
Update Profile
</button>

</form>

</div>

</div>

</div>

{% endblock %}
